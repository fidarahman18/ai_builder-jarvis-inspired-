<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Builder</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡ AI Builder</div>
      <div class="subtitle">Type an idea. Get a live app.</div>
    </div>

    <!-- Step 1: Idea input -->
    <div id="step-idea" class="card active">
      <label class="label">Your app idea</label>
      <textarea id="idea-input" placeholder="e.g. A real-time expense tracker with categories and charts..." rows="3"></textarea>
      <button id="btn-clarify" onclick="startClarify()">Continue →</button>
    </div>

    <!-- Step 2: Clarifying questions -->
    <div id="step-questions" class="card hidden">
      <label class="label">🤖 A few quick questions</label>
      <div id="questions-text" class="questions-box"></div>
      <textarea id="answers-input" placeholder="Your answers..." rows="3"></textarea>
      <button onclick="startBuild()">Build My App →</button>
    </div>

    <!-- Step 3: Live progress -->
    <div id="step-progress" class="card hidden">
      <label class="label">Building your app...</label>
      <div class="steps-list" id="steps-list"></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <!-- Step 4: Result -->
    <div id="step-result" class="card hidden">
      <div class="success-icon">🎉</div>
      <div class="result-title">Your app is live!</div>
      <div id="result-desc" class="result-desc"></div>
      <div class="links">
        <a id="link-live" href="#" target="_blank" class="btn-live">🌐 Open Live App</a>
        <a id="link-github" href="#" target="_blank" class="btn-github">📁 View on GitHub</a>
      </div>
      <button onclick="resetAll()" class="btn-reset">Build another →</button>
    </div>
  </div>

  <script>
    const steps = [
      "🤖 Generating app with GPT-4o...",
      "📁 Creating GitHub repo...",
      "⬆️ Pushing code...",
      "🚀 Deploying to Vercel...",
      "✅ Done!"
    ];

    function show(id) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    async function startClarify() {
      const idea = document.getElementById('idea-input').value.trim();
      if (!idea) return alert("Please enter an idea first.");
      document.getElementById('btn-clarify').textContent = "Thinking...";
      document.getElementById('btn-clarify').disabled = true;

      const res = await fetch('/clarify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({idea})
      });
      const data = await res.json();
      document.getElementById('questions-text').textContent = data.questions;
      show('step-questions');
    }

    function startBuild() {
      const idea = document.getElementById('idea-input').value.trim();
      const answers = document.getElementById('answers-input').value.trim();
      show('step-progress');
      document.getElementById('steps-list').innerHTML = '';
      document.getElementById('progress-bar').style.width = '0%';

      const evtSource = new EventSource(`/build?idea=${encodeURIComponent(idea)}&answers=${encodeURIComponent(answers)}`);

      // NOTE: SSE with POST needs a small workaround — use fetch + ReadableStream
      fetchStream(idea, answers);
    }

    async function fetchStream(idea, answers) {
      const res = await fetch('/build', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({idea, answers})
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const text = decoder.decode(value);
        const lines = text.split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          const data = JSON.parse(line.replace('data: ', ''));
          handleStep(data);
        }
      }
    }

    function handleStep(data) {
      if (data.error) {
        alert("Error: " + data.error);
        return;
      }
      const list = document.getElementById('steps-list');
      const div = document.createElement('div');
      div.className = 'step-item';
      div.textContent = data.msg;
      list.appendChild(div);
      document.getElementById('progress-bar').style.width = (data.step * 20) + '%';

      if (data.step === 5) {
        setTimeout(() => {
          show('step-result');
          document.getElementById('link-live').href = data.live;
          document.getElementById('link-github').href = data.github;
          document.getElementById('result-desc').textContent = data.description;
        }, 800);
      }
    }

    function resetAll() {
      document.getElementById('idea-input').value = '';
      document.getElementById('answers-input').value = '';
      document.getElementById('btn-clarify').textContent = 'Continue →';
      document.getElementById('btn-clarify').disabled = false;
      show('step-idea');
    }
  </script>
</body>
</html>
